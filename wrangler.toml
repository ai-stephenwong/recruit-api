name = "recruit-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "recruit-db"
database_id = "e63250fb-4ab3-44a1-9d7b-f9a5321f36ed"
migrations_dir = "src/db/migrations"

# ─── Secrets (set via `wrangler secret put OPENAI_API_KEY`) ──────────────────
# For local dev, copy .dev.vars.example to .dev.vars and fill in your keys.
# [vars]  ← do NOT put secrets here; use .dev.vars locally and `wrangler secret` in prod
